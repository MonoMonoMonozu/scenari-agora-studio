<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCENARI AGORA STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f0eb;
    --bg2:       #efe9e2;
    --bg3:       #e8e0d8;
    --bg-head:   #e2d9cf;
    --border:    #d4c9bc;
    --border2:   #c2b5a5;
    --text:      #352c24;
    --text2:     #5a4e44;
    --text3:     #9a8878;
    --accent:    #7a5c3a;
    --accent2:   #9a7450;

    --nankin:  #2a6e50; --nankin-bg: #e8f2ee; --nankin-bd: #9ecfbc;
    --roast:   #a84e20; --roast-bg:  #f5ede6; --roast-bd:  #d4a080;
    --kara:    #7a6e64; --kara-bg:   #eeebe8; --kara-bd:   #bab0a8;
    --golden:  #8a6c18; --golden-bg: #f5f0de; --golden-bd: #d4bc70;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg2);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
  }

  header {
    background: var(--bg);
    border-bottom: 2px solid var(--border2);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.07em;
  }
  header h1 span { color: var(--accent); }
  header p { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .stats {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 28px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
  }
  .stat-label { font-size: 11px; color: var(--text3); }
  .stat-count { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }

  .layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 102px); }

  .left {
    background: var(--bg);
    border-right: 2px solid var(--border2);
    display: flex;
    flex-direction: column;
  }
  .panel-ttl {
    background: var(--bg-head);
    border-bottom: 1px solid var(--border);
    padding: 9px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  textarea {
    flex: 1;
    border: none;
    background: var(--bg);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    line-height: 1.8;
    padding: 14px 16px;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: var(--text3); }

  .preview {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 12px 16px;
    min-height: 100px;
  }
  .preview h4 { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .preview-date { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .preview-item { font-size: 11px; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
  .preview-item .n { color: var(--text3); min-width: 16px; }

  .btn-add {
    margin: 10px 16px 12px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--accent2); }
  .btn-add:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  .right { display: flex; flex-direction: column; overflow: hidden; }

  .filterbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .fbtn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .fbtn:hover { border-color: var(--accent); color: var(--accent); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-input {
    margin-left: auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 3px;
    outline: none;
    width: 180px;
  }
  .search-input:focus { border-color: var(--accent); }

  .table-wrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    position: sticky; top: 0; z-index: 1;
    background: var(--bg-head);
    border-bottom: 2px solid var(--border2);
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:nth-child(even) { background: var(--bg2); }
  tbody tr:nth-child(odd)  { background: var(--bg);  }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 9px 12px; vertical-align: middle; font-size: 12px; }

  .td-no    { color: var(--text3); font-size: 11px; width: 30px; }
  .td-date  { color: var(--text2); font-size: 12px; font-weight: 500; white-space: nowrap; }
  .td-date input {
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 3px;
    width: 110px;
    outline: none;
  }
  .td-title { color: var(--text);  font-size: 12px; line-height: 1.5; }

  .genre-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 3px;
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border); white-space: nowrap; display: inline-block;
  }

  select.cs {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; padding: 3px 6px; border-radius: 3px; cursor: pointer; outline: none;
  }

  /* Teaching-Value: 全列同じフォント・サイズ・太さ、色のみ差分 */
  .tval { font-size: 12px; font-weight: 500; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; }
  .tval.s1 { color: var(--nankin); }
  .tval.s2 { color: var(--accent); }
  .tval.s3 { color: var(--golden); }
  .tval.s4 { color: var(--text3); }

  .btn-del {
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); font-size: 12px;
    width: 24px; height: 24px; border-radius: 3px; cursor: pointer; transition: all 0.12s;
  }
  .btn-del:hover { border-color: #c07070; color: #c07070; }

  .new-badge {
    display: inline-block; background: var(--accent2); color: #fff;
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 2px; margin-left: 6px; vertical-align: middle;
  }

  .empty { text-align: center; padding: 60px; color: var(--text3); }
  .empty h3 { font-size: 14px; color: var(--text2); margin-bottom: 6px; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--accent); color: #fff;
    font-size: 13px; padding: 10px 18px; border-radius: 5px;
    box-shadow: 0 3px 12px rgba(122,92,58,0.3);
    opacity: 0; transform: translateY(6px);
    transition: all 0.25s; pointer-events: none; z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>SCENARI <span>AGORA</span> STUDIO</h1>
    <p>ここから飛び立つ話題を探せ</p>
  </div>
</header>

<div class="stats" id="statsBar"></div>

<div class="layout">
  <div class="left">
    <div class="panel-ttl">📋 ナレッジ貼り付け → 追加</div>
    <textarea id="inputArea" placeholder="ここにナレッジページのテキストをそのままペーストしてください&#10;&#10;例：&#10;2026年3月18日 Pro相談会ナレッジ&#10;1. 友人のホームページを納品 - ...&#10;2. Playwrightで自動テスト・..."></textarea>
    <div class="preview">
      <h4>🔍 解析プレビュー</h4>
      <div id="previewContent"><span style="color:var(--text3);font-size:11px;">テキストを貼ると自動解析します</span></div>
    </div>
    <button class="btn-add" id="btnAdd" disabled onclick="addEntries()">▶ テーブルに追加</button>
  </div>

  <div class="right">
    <div class="filterbar">
      <button class="fbtn active" onclick="setFilter('ALL',this)">すべて</button>
      <button class="fbtn" onclick="setFilter('NANKIN',this)">🟢 NANKIN</button>
      <button class="fbtn" onclick="setFilter('ROAST',this)">🔥 ROAST</button>
      <button class="fbtn" onclick="setFilter('KARA',this)">⬜ KARA</button>
      <button class="fbtn" onclick="setFilter('GOLDEN',this)">🌟 GOLDEN</button>
      <input class="search-input" id="searchInput" placeholder="🔍 タイトル検索..." oninput="renderTable()">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>収録日</th><th>タイトル</th><th>ジャンル</th>
            <th>Hidden Code</th><th>Teaching-Value</th><th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">
        <h3>データがありません</h3>
        <p>左パネルにナレッジテキストをペーストして追加してください</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let records = [];
let nextId=1, currentFilter='ALL';
let newIds=new Set();

function parseInput(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  let date=null; const titles=[];
  for(const line of lines){
    const dm=line.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
    if(dm) date=`${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
    const tm=line.match(/^\d+[\.．\)）]\s*(.+)/);
    if(tm) titles.push(tm[1].trim());
  }
  return {date,titles};
}

function classify(title){
  let code='ROAST',genre='技術実践',tval='○使えそう';
  if(/本質|変わらない|姿勢|美徳|向き合い|ステートレス|来続ける|歴史|初めまして/.test(title)) code='NANKIN';
  else if(/3日半|10万|600ページ|YCombinator|Y Combinator/.test(title)) code='GOLDEN';
  if(/思想|美徳|本質|向き合い|姿勢|歴史|変わらない|時代に|ステートレス|メタバース/.test(title)) genre='思想・教育';
  else if(/TTS|Qwen|Cowork|POPOPO|A2UI|動画制作|Open Claw/.test(title)) genre='ツール紹介';
  else if(/ビジネス|10万|健康|ピッチ|資料作成|YCombinator/.test(title)) genre='ビジネス事例';
  if(code==='GOLDEN'||code==='NANKIN') tval='◎即戦力';
  else if(code==='KARA') tval='─参考程度';
  return {code,genre,tval};
}

document.getElementById('inputArea').addEventListener('input',function(){
  const {date,titles}=parseInput(this.value);
  const box=document.getElementById('previewContent');
  const btn=document.getElementById('btnAdd');
  if(!date&&!titles.length){
    box.innerHTML='<span style="color:var(--text3);font-size:11px;">テキストを貼ると自動解析します</span>';
    btn.disabled=true; return;
  }
  let html=date?`<div class="preview-date">📅 ${date}</div>`
    :`<div style="color:var(--roast);font-size:11px;margin-bottom:6px;">⚠ 日付が見つかりません</div>`;
  html+=titles.map((t,i)=>`<div class="preview-item"><span class="n">${i+1}.</span><span>${t.length>36?t.slice(0,36)+'…':t}</span></div>`).join('');
  box.innerHTML=html;
  btn.disabled=!(date&&titles.length);
});

function addEntries(){
  const {date,titles}=parseInput(document.getElementById('inputArea').value);
  if(!date||!titles.length) return;
  const added=titles.map(title=>{
    const {code,genre,tval}=classify(title);
    const rec={id:nextId++,date,title,genre,code,tval};
    records.push(rec); newIds.add(rec.id); return rec;
  });
  document.getElementById('inputArea').value='';
  document.getElementById('previewContent').innerHTML='<span style="color:var(--text3);font-size:11px;">テキストを貼ると自動解析します</span>';
  document.getElementById('btnAdd').disabled=true;
  setTimeout(()=>{added.forEach(r=>newIds.delete(r.id));renderTable();},5000);
  renderAll();
  showToast(`✅ ${added.length}件追加しました（${date}）`);
}

function setFilter(code,el){
  currentFilter=code;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); renderTable();
}

function renderStats(){
  const c={NANKIN:0,ROAST:0,KARA:0,GOLDEN:0};
  records.forEach(r=>c[r.code]++);
  document.getElementById('statsBar').innerHTML=[
    {emoji:'🟢',label:'NANKIN', count:c.NANKIN, color:'var(--nankin)'},
    {emoji:'🔥',label:'ROAST',  count:c.ROAST,  color:'var(--roast)'},
    {emoji:'⬜',label:'KARA',   count:c.KARA,   color:'var(--kara)'},
    {emoji:'🌟',label:'GOLDEN', count:c.GOLDEN, color:'var(--golden)'},
    {emoji:'📚',label:'TOTAL',  count:records.length, color:'var(--accent)'},
  ].map(s=>`<div class="stat"><span>${s.emoji}</span><span class="stat-label">${s.label}</span><span class="stat-count" style="color:${s.color}">${s.count}</span></div>`).join('');
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=records.filter(r=>{
    if(currentFilter!=='ALL'&&r.code!==currentFilter) return false;
    if(q&&!r.title.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const tc=v=>v==='◎即戦力'?'s1':v==='○使えそう'?'s2':v==='△要加工'?'s3':'s4';
  document.getElementById('emptyState').style.display=filtered.length?'none':'block';
  document.getElementById('tableBody').innerHTML=filtered.map(r=>`
    <tr>
      <td class="td-no">${r.id}</td>
      <td class="td-date" onclick="editDate(this,${r.id})" style="cursor:pointer" title="クリックで編集">${r.date}${newIds.has(r.id)?'<span class="new-badge">NEW</span>':''}</td>
      <td class="td-title">${r.title}</td>
      <td><span class="genre-tag">${r.genre}</span></td>
      <td><select class="cs" onchange="changeCode(${r.id},this.value)">
        <option value="NANKIN" ${r.code==='NANKIN'?'selected':''}>🟢 NANKIN</option>
        <option value="ROAST"  ${r.code==='ROAST' ?'selected':''}>🔥 ROAST</option>
        <option value="KARA"   ${r.code==='KARA'  ?'selected':''}>⬜ KARA</option>
        <option value="GOLDEN" ${r.code==='GOLDEN'?'selected':''}>🌟 GOLDEN</option>
      </select></td>
      <td><span class="tval ${tc(r.tval)}">${r.tval}</span></td>
      <td><button class="btn-del" onclick="deleteRecord(${r.id})">×</button></td>
    </tr>`).join('');
}

function editDate(cell, id) {
  if (cell.querySelector('input')) return;
  const r = records.find(r => r.id === id);
  if (!r) return;
  const original = r.date;
  cell.innerHTML = `<input type="text" value="${original}" placeholder="YYYY-MM-DD" maxlength="10">`;
  const input = cell.querySelector('input');
  input.focus(); input.select();
  function save() {
    const v = input.value.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) { r.date = v; showToast('📅 日付を更新しました'); }
    else { r.date = original; }
    renderAll();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){r.date=original;renderAll();} });
  input.addEventListener('click', e => e.stopPropagation());
}
function changeCode(id,code){const r=records.find(r=>r.id===id);if(r){r.code=code;renderAll();}}
function deleteRecord(id){if(!confirm('削除しますか？'))return;records=records.filter(r=>r.id!==id);renderAll();}
function renderAll(){renderStats();renderTable();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

renderAll();
</script>
</body>
</html>
